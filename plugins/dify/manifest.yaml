version: 0.2.0
type: plugin
author: prompt-shield
name: prompt-shield
label:
  en_US: Prompt Shield
description:
  en_US: >-
    Local prompt injection detection, output scanning, and PII redaction powered
    by prompt-shield. 27 input detectors including novel cross-domain techniques
    (Smith-Waterman sequence alignment, stylometric discontinuity detection),
    6 output scanners, and PII redaction. All processing runs locally with no
    external API calls.
icon: icon.svg
resource:
  memory: 268435456
  permission:
    tool:
      enabled: true
    endpoint:
      enabled: false
    model:
      enabled: false
    node:
      enabled: false
    storage:
      enabled: false
      size: 1048576
plugins:
  tools:
    - "provider/prompt_shield.yaml"
meta:
  version: 0.0.1
  arch:
    - amd64
    - arm64
  runner:
    language: python
    version: "3.12"
    entrypoint: main
created_at: 2026-03-15T00:00:00Z
privacy: PRIVACY.md
